# Gossip detector baseline: same conditions as baseline.toml but using
# the gossip-assisted suspicion strategy.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 10
jitter = 2
drop_probability = 0.0

[detector]
strategy = "gossip"
timeout = 200
suspicion_threshold = 3
gossip_interval = 50
gossip_fanout = 3
