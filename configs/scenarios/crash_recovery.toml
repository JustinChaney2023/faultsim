# Crash and recovery scenario: one node crashes, then recovers.
# Tests detection latency and false-positive behavior during transient faults.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 10
jitter = 2
drop_probability = 0.0

[detector]
strategy = "fixed_timeout"
timeout = 200

# Node 3 crashes at tick 2000 and recovers at tick 4000.
[[faults]]
tick = 2000
kind = "crash"
node = 3

[[faults]]
tick = 4000
kind = "recover"
node = 3
