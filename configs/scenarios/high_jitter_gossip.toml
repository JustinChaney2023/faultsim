# High-jitter scenario with gossip-assisted detector.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 50
jitter = 38
drop_probability = 0.0

[detector]
strategy = "gossip"
suspicion_threshold = 3
timeout = 200
gossip_interval = 50
gossip_fanout = 3

[output]
dir = "results/high_jitter_gossip"
format = "csv"
