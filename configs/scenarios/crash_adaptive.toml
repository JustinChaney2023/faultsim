# Crash scenario with adaptive detector.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 10
jitter = 2
drop_probability = 0.0

[detector]
strategy = "adaptive"
alpha = 0.5
safety_multiplier = 2.0

[[faults]]
tick = 2000
kind = "crash"
node = 3

[[faults]]
tick = 4000
kind = "recover"
node = 3

[output]
dir = "results/crash_adaptive"
format = "csv"
