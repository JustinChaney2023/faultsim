# High-jitter scenario, Satzger 2007 detector at higher threshold (3.0).
# Probes whether the FP regression at threshold=2.0 is a tuning issue.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 50
jitter = 38
drop_probability = 0.0

[detector]
strategy = "adaptive_accrual"
phi_threshold = 3.0
phi_window_size = 100

[output]
dir = "results/high_jitter_adaptive_accrual_t3"
format = "csv"
phi_log = true
