# High-jitter scenario with Satzger 2007 adaptive accrual detector.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 50
jitter = 38
drop_probability = 0.0

[detector]
strategy = "adaptive_accrual"
phi_threshold = 2.0
phi_window_size = 100
