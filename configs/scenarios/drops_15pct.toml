# 15% packet loss scenario with fixed-timeout detector.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 10
jitter = 2
drop_probability = 0.15

[detector]
strategy = "fixed_timeout"
timeout = 200

[output]
dir = "results/drops_15pct"
format = "csv"
