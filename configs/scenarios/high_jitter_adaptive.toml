# High-jitter scenario with adaptive detector.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 50
jitter = 38
drop_probability = 0.0

[detector]
strategy = "adaptive"
alpha = 0.5
safety_multiplier = 2.0

[output]
dir = "results/high_jitter_adaptive"
format = "csv"
