# Adaptive detector baseline: same conditions as baseline.toml but using
# the EWMA-based adaptive timeout strategy.

[simulation]
max_ticks = 10000
seed = 42

[cluster]
node_count = 10
heartbeat_interval = 100

[network]
base_latency = 10
jitter = 2
drop_probability = 0.0

[detector]
strategy = "adaptive"
alpha = 0.5
safety_multiplier = 2.0

[output]
dir = "results/adaptive"
format = "csv"
